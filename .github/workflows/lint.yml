name: Lint & Type Check

on:
  pull_request:
    branches:
      - 'main'
      - 'develop'

permissions:
  contents: read
  checks: write

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: Update poetry.lock
        run: poetry lock --no-interaction

      - name: Install dependencies
        run: poetry install

      - name: Run Black formatter check
        run: poetry run black --check .
        continue-on-error: true

      - name: Run isort import sorter check
        run: poetry run isort --check-only .
        continue-on-error: true

      - name: Run flake8 linter
        run: poetry run flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        continue-on-error: true

      - name: Run flake8 full check
        run: poetry run flake8 . --max-line-length=120 --statistics
        continue-on-error: true

      - name: Run mypy type checker
        run: poetry run mypy . --ignore-missing-imports --no-error-summary 2>&1 | grep -E "error:" | head -50 || echo "Type check passed or errors are acceptable"
        continue-on-error: true

      - name: Summary
        if: always()
        run: echo "✅ Lint checks completed (warnings do not block merge)"
